name: Release

# 兩種發佈方式：
#   1. 命令列推 v* tag：  git tag v2.2 && git push origin v2.2
#   2. Actions 分頁手動：Run workflow → 在「tag」欄填 v2.2
# tag 欄留空時只建置＋上傳 artifact 驗證，不會發 release。
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '要發佈的版本 tag（例如 v2.2）。留空＝只建置驗證、不發 release。'
        required: false
        default: ''
      prerelease:
        description: '標記為 pre-release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller tkinterdnd2

      - name: Build desktop exe
        run: pyinstaller --noconfirm --onefile --windowed --name timeline_detector --additional-hooks-dir . exe_ver/timeline_detector.py

      - name: Upload build artifact (validation runs)
        uses: actions/upload-artifact@v4
        with:
          name: timeline_detector-exe
          path: dist/timeline_detector.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: KKTimelineDetector ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: dist/timeline_detector.exe
